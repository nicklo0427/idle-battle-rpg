name: IdleBattleRPG

options:
  bundleIdPrefix: com.lowhaijer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  generateEmptyDirectories: true

targets:
  IdleBattleRPG:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IdleBattleRPG
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.lowhaijer.IdleBattleRPG
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: IdleBattleRPG/Info.plist
      properties:
        CFBundleDisplayName: "放置英雄"
        NSHumanReadableCopyright: "Copyright © 2026 lowhaijer. All rights reserved."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
