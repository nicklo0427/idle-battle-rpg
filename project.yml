name: IdleBattleRPG
options:
  bundleIdPrefix: com.yourstudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_NAME: IdleBattleRPG
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  IdleBattleRPG:
    type: application
    platform: iOS
    sources:
      - path: IdleBattleRPG
        excludes:
          - "Tests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourstudio.IdleBattleRPG
        INFOPLIST_FILE: IdleBattleRPG/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""  # 填入你的 Apple Developer Team ID
    entitlements:
      path: IdleBattleRPG/IdleBattleRPG.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.yourstudio.IdleBattleRPG

  IdleBattleRPGTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - IdleBattleRPG/Tests
    dependencies:
      - target: IdleBattleRPG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourstudio.IdleBattleRPGTests
