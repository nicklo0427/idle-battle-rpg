name: IdleBattleRPG

options:
  bundleIdPrefix: com.lowhaijer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: zh-Hant

packages:
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    from: "2.1.0"

targets:
  IdleBattleRPG:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IdleBattleRPG
    dependencies:
      - package: PhosphorSwift
        product: PhosphorSwift
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.lowhaijer.IdleBattleRPG
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: IdleBattleRPG/Info.plist
      properties:
        CFBundleDisplayName: "放置英雄"
        NSHumanReadableCopyright: "Copyright © 2026 lowhaijer. All rights reserved."
        CFBundleLocalizations:
          - zh-Hant
          - en
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false

  IdleBattleRPGTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: IdleBattleRPGTests
    dependencies:
      - target: IdleBattleRPG
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.lowhaijer.IdleBattleRPGTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  IdleBattleRPG:
    build:
      targets:
        IdleBattleRPG: all
        IdleBattleRPGTests: [test]
    test:
      targets:
        - IdleBattleRPGTests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
